<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Loading… | Nalain Pak Acrylic Collection</title>
<meta name="description" id="pageDesc" content="Nalain Pak Acrylic Collection product.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="index.html">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#B8902E" stroke-width="1.4"/>
        <path d="M20 6 L23 17 L34 17 L25 24 L28 35 L20 28 L12 35 L15 24 L6 17 L17 17 Z" fill="#B8902E"/>
      </svg>
      Nalain Pak Acrylic Collection
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="catalog.html">Shop All</a>
    </nav>
    <a class="nav-cta" href="https://wa.me/923332108040" target="_blank">Order on WhatsApp</a>
  </div>
</header>

<div class="wrap product-detail" id="detail">
  <!-- filled in automatically by script below -->
</div>

<footer>
  <div class="wrap">
    <div class="footer-grid">
      <div>
        <div class="footer-brand">Nalain Pak Acrylic Collection</div>
        <p style="margin-top:8px;max-width:240px;opacity:0.8;">Islamic acrylic car hangings &amp; badges, hand-finished in Hyderabad.</p>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <p>+92 333 2108040</p>
        <p>Founder: Fuzail Ahmed</p>
        <p>Hyderabad, Sindh</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 Nalain Pak Acrylic Collection</span>
      <span>Hyderabad, Pakistan</span>
    </div>
  </div>
</footer>

<script>
  async function loadProduct(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const res = await fetch('products.json');
    const products = await res.json();
    const p = products.find(x => x.id === id);

    if(!p){
      document.getElementById('detail').innerHTML = '<p style="padding:60px 0;">Product not found. <a href="catalog.html">Back to catalog →</a></p>';
      return;
    }

    document.getElementById('pageTitle').textContent = p.name + ' | Nalain Pak Acrylic Collection';
    document.getElementById('pageDesc').setAttribute('content', p.description);

    const waMessage = encodeURIComponent(`Assalam-o-Alaikum, I'm interested in the ${p.name} (Rs. ${p.price}).`);

    document.getElementById('detail').innerHTML = `
      <div class="detail-image" style="background-image:url('${p.image}')"></div>
      <div>
        <h1 class="detail-name">${p.name}</h1>
        <p class="detail-price">Rs. ${p.price}</p>
        <p class="detail-desc">${p.description}</p>

        <div class="option-group">
          <span class="option-label">Size</span>
          <div class="option-pills"><span class="pill">${p.size}</span></div>
        </div>

        <div class="option-group">
          <span class="option-label">Available Colors</span>
          <div class="option-pills">
            ${p.colors.map(c => `<span class="pill">${c}</span>`).join('')}
          </div>
        </div>

        <a class="btn btn-primary" href="https://wa.me/923332108040?text=${waMessage}" target="_blank">Order on WhatsApp →</a>
      </div>
    `;
  }

  loadProduct();
</script>

</body>
</html>
